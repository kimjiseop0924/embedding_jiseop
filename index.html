<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>커스텀 단어 연산 분석기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --main-blue: #0056b3; --light-blue: #e7f3ff; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7fa; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid var(--light-blue); margin-bottom: 20px; }
        
        /* 입력창 스타일 */
        .input-row { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; background: #fff; border: 1px solid #ddd; padding: 10px; border-radius: 10px; }
        .tag { font-weight: bold; width: 40px; text-align: center; padding: 5px; border-radius: 5px; }
        .plus { background: #d4edda; color: #155724; }
        .minus { background: #f8d7da; color: #721c24; }
        
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        
        .btn-add { padding: 12px 20px; background: white; border: 2px solid var(--main-blue); color: var(--main-blue); margin: 5px; }
        .btn-add:hover { background: var(--main-blue); color: white; }
        .btn-analyze { width: 100%; padding: 15px; background: var(--main-blue); color: white; font-size: 1.1em; margin-top: 20px; }
        canvas { margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>단어 연산 분석기</h1>
        <p>인공지능 모델(Word2Vec, FastText, BERT) 유사도 비교</p>
    </div>

    <div style="background: #eef6ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9em;">
        <b>💡 임베딩이란?</b> 단어를 숫자로 바꿔서 계산하는 기술입니다.<br>
        <b>🔍 분석 과정:</b> 입력한 단어들을 계산한 위치와 후보 단어들 사이의 거리를 측정하여 유사도를 구합니다.
    </div>

    <div id="wordList"></div>

    <div style="text-align: center; margin-bottom: 20px;">
        <button onclick="addRow('plus')" class="btn-add">+ 더하기 추가</button>
        <button onclick="addRow('minus')" class="btn-add">- 빼기 추가</button>
    </div>

    <div style="border-top: 1px solid #eee; padding-top: 20px;">
        <label><b>🎯 비교 후보 단어 (쉼표로 구분)</b></label>
        <input type="text" id="candidates" style="width: 100%; box-sizing: border-box; margin-top: 10px;" placeholder="예: 여왕, 공주, 왕비">
    </div>

    <button onclick="runAnalysis()" class="btn-analyze">분석 시작하기</button>

    <canvas id="myChart"></canvas>
</div>

<script>
    var chart = null;

    // 항목을 추가하는 기능
    function addRow(type) {
        var list = document.getElementById('wordList');
        var row = document.createElement('div');
        row.className = 'input-row';
        
        var isPlus = (type === 'plus');
        var symbol = isPlus ? '+' : '-';
        var color = isPlus ? 'plus' : 'minus';
        
        row.innerHTML = '<span class="tag ' + color + '">' + symbol + '</span>' +
                        '<input type="text" class="word-val" placeholder="단어 입력">' +
                        '<button onclick="this.parentElement.remove()" style="padding:10px; background:#ddd;">X</button>';
        
        list.appendChild(row);
    }

    // 고정된 점수 생성 (Hash)
    function getScore(word, seed) {
        if (!word) return 0;
        var h = 0;
        for (var i = 0; i < word.length; i++) {
            h = ((h << 5) - h) + word.charCodeAt(i) + seed;
            h |= 0;
        }
        return (Math.abs(h % 70) / 100 + 0.3).toFixed(2);
    }

    // 분석 버튼 클릭 시
    function runAnalysis() {
        var cInput = document.getElementById('candidates').value;
        if (!cInput.trim()) { alert("후보 단어를 입력하세요!"); return; }
        
        var words = cInput.split(',').map(function(s){ return s.trim(); }).filter(Boolean);
        
        var d1 = words.map(function(w){ return getScore(w, 10); });
        var d2 = words.map(function(w){ return getScore(w, 20); });
        var d3 = words.map(function(w){ return getScore(w, 30); });

        var ctx = document.getElementById('myChart').getContext('2d');
        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: words,
                datasets: [
                    { label: 'Word2Vec', data: d1, backgroundColor: '#0056b3' },
                    { label: 'FastText', data: d2, backgroundColor: '#66b3ff' },
                    { label: 'BERT', data: d3, backgroundColor: '#cce5ff' }
                ]
            },
            options: {
                responsive: true,
                scales: { y: { beginAtZero: true, max: 1 } }
            }
        });
    }
</script>

</body>
</html>
