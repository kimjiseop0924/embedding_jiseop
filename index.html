<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>커스텀 단어 분석기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #030712;
            --panel: #111827;
            --cyan: #22d3ee;
            --violet: #8b5cf6;
            --rose: #f43f5e;
            --text: #f9fafb;
        }

        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5em;
            text-align: center;
            background: linear-gradient(to right, var(--cyan), var(--violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 입력창 스타일 */
        .input-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tag {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-weight: 900;
            font-size: 1.2em;
        }

        .plus-tag { background: rgba(34, 211, 238, 0.1); color: var(--cyan); border: 1px solid var(--cyan); }
        .minus-tag { background: rgba(244, 63, 94, 0.1); color: var(--rose); border: 1px solid var(--rose); }

        input {
            flex: 1;
            padding: 15px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 12px;
            color: white;
            font-size: 1em;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--violet);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
        }

        /* 버튼 그룹 */
        .btn-add {
            padding: 12px 25px;
            background: transparent;
            border: 2px solid #4b5563;
            color: #9ca3af;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            margin: 5px;
        }

        .btn-add:hover {
            border-color: var(--cyan);
            color: var(--cyan);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.2);
        }

        .btn-analyze {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #22d3ee, #8b5cf6);
            border: none;
            color: white;
            font-weight: 900;
            font-size: 1.2em;
            border-radius: 15px;
            margin-top: 30px;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.5);
            transition: 0.3s;
        }
