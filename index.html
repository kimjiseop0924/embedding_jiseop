<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단어 연산 분석기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --main-blue: #0056b3; --light-blue: #e7f3ff; --bg-color: #f4f7fa; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg-color); padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .header { text-align: center; border-bottom: 2px solid var(--light-blue); margin-bottom: 20px; padding-bottom: 10px; }
        .intro-box { background: var(--light-blue); padding: 15px; border-radius: 12px; margin-bottom: 20px; font-size: 0.9em; }
        
        /* 입력 행 스타일 */
        .input-row { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; background: #fff; padding: 5px; border-radius: 8px; border: 1px solid #eee; }
        .tag { font-weight: bold; width: 40px; text-align: center; padding: 8px 0; border-radius: 6px; }
        .plus { background: #d4edda; color: #155724; }
        .minus { background: #f8d7da; color: #721c24; }
        
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; }
        
        /* 버튼 스타일 */
        .btn-group { text-align: center; margin: 20px 0; }
        .btn-add { padding: 12px 20px; background: #fff; border: 2px solid var(--main-blue); color: var(--main-blue); margin: 0 5px; font-size: 14px; }
        .btn-add:hover { background: var(--main-blue); color: white; }
        .btn-del { padding: 8px 12px; background: #f0f0f0; color: #666; }
        .btn-analyze { width: 100%; padding: 15px; background: var(--main-blue); color: white; font-size: 1.1em; margin-top: 10px; }
        
        canvas { margin-top: 30px; width: 100% !important; height: auto !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>커스텀 단어 연산 분석기</h1>
        <p>인공지능의 단어 계산법을 체험해보세요!</p>
    </div>

    <div class="intro-box">
        <b>💡 임베딩(Embedding)이란?</b><br>
        단어를 숫자로 바꾸어 컴퓨터가 이해하게 만드는 과정입니다. 
        비슷한 의미는 가깝게, 반대 의미는 멀게 배치하여 단어끼리 더하고 뺄 수 있게 합니다.
    </div>

    <div id="wordContainer"></div>

    <div class="btn-group">
        <button type="button" class="btn-add" onclick="addNewLine('plus')">+ 더하기(+) 추가</button>
        <button type="button" class="btn-add" onclick="addNewLine('minus')">- 빼기(-) 추가</button>
    </div>

    <div style="border-top: 2px solid #f0f0f0; padding-top: 20px;">
        <label><b>🎯 비교 후보 단어 (쉼표로 구분)</b></label>
        <input type="text" id="targetWords" style="width: 100%; box-sizing: border-box; margin-top: 10px;" placeholder="예: 여왕, 공주, 왕비">
    </div>

    <button type="button" class="btn-analyze" onclick="startAnalysis()">분석 결과 보기</button>
