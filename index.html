<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>커스텀 단어 분석기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0a192f;
            --card-bg: #112240;
            --accent-blue: #64ffda;
            --soft-blue: #00d2ff;
            --text-main: #e6f1ff;
            --text-sub: #8892b0;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 210, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header h1 {
            color: var(--soft-blue);
            text-align: center;
            font-size: 2.2em;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
            margin-bottom: 10px;
        }

        .intro-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid var(--soft-blue);
            margin-bottom: 30px;
            color: var(--text-sub);
        }

        /* 입력창 디자인 */
        .input-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tag {
            font-weight: bold;
            width: 45px;
            text-align: center;
            padding: 10px 0;
            border-radius: 8px;
            font-size: 1.2em;
        }

        .plus { background: rgba(100, 255, 218, 0.1); color: var(--accent-blue); box-shadow: 0 0 10px rgba(100, 255, 218, 0.2); }
        .minus { background: rgba(255, 100, 100, 0.1); color: #ff6464; box-shadow: 0 0 10px rgba(255, 100, 100, 0.2); }

        input {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--soft-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        /* 버튼 스타일 */
        .btn-add {
            padding: 12px 25px;
            background: transparent;
            border: 2px solid var(--soft-blue);
            color: var(--soft-blue);
            margin: 10px 5px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-add:hover {
            background: var(--soft-blue);
            color: var(--bg-dark);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
        }

        .btn-analyze {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
            font-size: 1.2em;
            margin-top: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        .btn-analyze:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.5);
        }

        .btn-del {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-sub);
            padding: 10px 15px;
        }

        .btn-del:hover { background: #ff6464; color: white; }

        canvas { margin-top: 40px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Word Embedding Explorer</h1>
        <p style="color: var(--text-sub); text-align: center;">단어의 연산을 통해 인공지능의 사고 방식을 엿보세요.</p>
    </div>

    <div class="intro-box">
        <b>🤖 단어 임베딩(Word Embedding)이란?</b><br>
        컴퓨터는 단어를 <b>좌표 공간상의 숫자</b>로 이해합니다. "왕 - 남자 + 여자 = 여왕"과 같은 신기한 계산이 가능한 이유는 단어들이 의미에 따라 특정 거리에 배치되어 있기 때문입니다.
    </div>

    <div id="wordListArea"></div>

    <div style="text-align: center; margin-bottom: 30px;">
        <button onclick="addRow('plus')" class="btn-add">+ Add Positive</button>
        <button onclick="addRow('minus')" class="btn-add">- Add Negative</button>
    </div>

    <div style="background: rgba(255,255,255,0.02); padding: 25px; border-radius: 15px;">
        <label style="display: block; margin-bottom: 10px; font-weight: bold;">🎯 유사도 후보 단어 (쉼표로 구분)</label>
        <input type="text" id="candidateList" style="width: 100%; box-sizing: border-box;" placeholder="여왕, 공주, 왕비, 궁전">
    </div>

    <button onclick="calculate()" class="btn-analyze">분석 데이터 생성 및 비교</button>

    <canvas id="similarityChart"></canvas>
</div>

<script>
    let chartObj = null;

    // 항목 추가 함수
    function addRow(type) {
        const area = document.getElementById('wordListArea');
        const row = document.createElement('div');
        row.className = 'input-row';
        
        const isPlus = (type === 'plus');
        const symbol = isPlus ? '+' : '-';
        const cssClass = isPlus ? 'plus' : 'minus';
        
        row.innerHTML = `
            <span class="tag ${cssClass}">${symbol}</span>
            <input type="text" class="word-input-field" placeholder="단어 입력...">
            <button onclick="this.parentElement.remove()" class="btn-del">삭제</button>
        `;
        area.appendChild(row);
    }

    // 일정한 유사도 값 생성 함수
    function getStableSimilarity(word, seed) {
        if (!word) return 0;
        let h = 0;
        for (let i = 0; i < word.length; i++) {
            h = ((h << 5) - h) + word.charCodeAt(i) + seed;
            h |= 0;
        }
        return (Math.abs(h % 65) / 100 + 0.35).toFixed(2);
    }
