<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>커스텀 단어 분석기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #050a15;
            --card: #0d1626;
            --neon: #00f2ff;
            --neon-pink: #ff007a;
            --text: #ffffff;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 242, 255, 0.1);
        }

        h1 {
            text-align: center;
            color: var(--neon);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .intro {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            font-size: 0.9em;
            margin-bottom: 25px;
            border-left: 4px solid var(--neon);
        }

        /* 입력창 스타일 */
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .symbol {
            width: 40px;
            height: 40px;
            line-height: 40px;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2em;
        }

        .plus-tag { background: rgba(0, 242, 255, 0.1); color: var(--neon); border: 1px solid var(--neon); }
        .minus-tag { background: rgba(255, 0, 122, 0.1); color: var(--neon-pink); border: 1px solid var(--neon-pink); }

        input {
            flex: 1;
            padding: 12px;
            background: #1a2639;
            border: 1px solid #30475e;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        input:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }

        /* 버튼 스타일 */
        .btn-add {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--neon);
            color: var(--neon);
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
            transition: 0.2s;
        }

        .btn-add:hover {
            background: var(--neon);
            color: var(--bg);
            box-shadow: 0 0 15px var(--neon);
        }

        .btn-del {
            background: #2a3a50;
            color: #ff4d4d;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-analyze {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #00f2ff, #0072ff);
            border: none;
            color: white;
            font-weight: bold;
