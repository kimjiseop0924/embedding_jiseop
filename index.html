<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 커스텀 단어 분석기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #050a15;
            --card: #0d1626;
            --neon: #00f2ff;
            --neon-pink: #ff007a;
            --text: #ffffff;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 242, 255, 0.1);
        }

        h1 {
            text-align: center;
            color: var(--neon);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .intro {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            font-size: 0.9em;
            margin-bottom: 25px;
            border-left: 4px solid var(--neon);
        }

        /* 입력창 스타일 */
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .symbol {
            width: 40px;
            height: 40px;
            line-height: 40px;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2em;
        }

        .plus-tag { background: rgba(0, 242, 255, 0.1); color: var(--neon); border: 1px solid var(--neon); }
        .minus-tag { background: rgba(255, 0, 122, 0.1); color: var(--neon-pink); border: 1px solid var(--neon-pink); }

        input {
            flex: 1;
            padding: 12px;
            background: #1a2639;
            border: 1px solid #30475e;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        input:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }

        /* 버튼 스타일 */
        .btn-add {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--neon);
            color: var(--neon);
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
            transition: 0.2s;
        }

        .btn-add:hover {
            background: var(--neon);
            color: var(--bg);
            box-shadow: 0 0 15px var(--neon);
        }

        .btn-del {
            background: #2a3a50;
            color: #ff4d4d;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-analyze {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #00f2ff, #0072ff);
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.1em;
            border-radius: 12px;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 114, 255, 0.4);
        }

        .btn-analyze:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0, 242, 255, 0.6); }

        canvas { margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Word Analysis Lab</h1>
    
    <div class="intro">
        <b>💡 임베딩 설명</b>: 단어를 숫자로 표현해 공간에 배치하는 기술입니다.<br>
        <b>🔍 유사도 분석</b>: 계산된 단어의 위치와 후보들의 거리를 비교합니다.
    </div>

    <div id="wordList"></div>

    <div style="text-align: center; margin: 20px 0;">
        <button class="btn-add" onclick="addRow('plus')">+ 항목 추가 (+)</button>
        <button class="btn-add" onclick="addRow('minus')">- 항목 추가 (-)</button>
    </div>

    <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px;">
        <label style="display: block; margin-bottom: 10px; font-weight: bold;">🎯 유사도 후보 단어 (쉼표로 구분)</label>
        <input type="text" id="targetWords" style="width:100%; box-sizing: border-box;" placeholder="여왕, 공주, 왕비">
    </div>

    <button class="btn-analyze" onclick="startAnalysis()">분석 실행</button>

    <canvas id="myChart"></canvas>
</div>

<script>
    // 항목 추가 함수 (가장 먼저 정의)
    function addRow(type) {
        var container = document.getElementById('wordList');
        var row = document.createElement('div');
        row.className = 'input-row';
        
        var isPlus = (type === 'plus');
        var symbol = isPlus ? '+' : '-';
        var styleClass = isPlus ? 'plus-tag' : 'minus-tag';
        
        row.innerHTML = '<div class="symbol ' + styleClass + '">' + symbol + '</div>' +
                        '<input type="text" class="word-input" placeholder="단어 입력">' +
                        '<button class="btn-del" onclick="this.parentElement.remove()">삭제</button>';
        
        container.appendChild(row);
    }

    var myChart = null;

    // 점수 생성기 (일관성 유지)
    function generateFixedScore(word, seed) {
        if (!word) return 0;
        var hash = 0;
        for (var i = 0; i < word.length; i++) {
            hash = ((hash << 5) - hash) + word.charCodeAt(i) + seed;
            hash |= 0;
        }
        return (Math.abs(hash % 70) / 100 + 0.3).toFixed(2);
    }

    // 분석 실행
    function startAnalysis() {
        var input = document.getElementById('targetWords').value;
        if (!input.trim()) { alert("후보 단어를 입력하세요!"); return; }
        
        var candidates = input.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
        
        var d1 = candidates.map(function(w) { return generateFixedScore(w, 11); });
        var d2 = candidates.map(function(w) { return generateFixedScore(w, 22); });
        var d3 = candidates.map(function(w) { return generateFixedScore(w, 33); });

        var ctx = document.getElementById('myChart').getContext('2d');
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: candidates,
                datasets: [
                    { label: 'Word2Vec', data: d1, backgroundColor: '#00f2ff' },
                    { label: 'FastText', data: d2, backgroundColor: '#0072ff' },
                    { label: 'BERT', data: d3, backgroundColor: '#ff007a' }
                ]
            },
            options: {
                responsive: true,
                scales: { y: { beginAtZero: true, max: 1, grid: { color: '#1a2639' } } }
            }
        });
    }
</script>

</body>
</html>
