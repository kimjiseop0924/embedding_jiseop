<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커스텀 단어 연산 분석기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --main-blue: #0056b3; --light-blue: #e7f3ff; --bg-color: #f4f7fa; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg-color); color: #333; padding: 20px; }
        .container { max-width: 750px; margin: 0 auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* 헤더 & 설명 */
        .header { text-align: center; border-bottom: 2px solid var(--light-blue); margin-bottom: 25px; padding-bottom: 15px; }
        h1 { color: var(--main-blue); margin-bottom: 5px; }
        .intro-box { background: var(--light-blue); padding: 15px; border-radius: 12px; margin-bottom: 25px; font-size: 0.95em; }
        
        /* 입력창 스타일 */
        .input-row { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; }
        .tag { font-weight: bold; width: 35px; text-align: center; padding: 8px 0; border-radius: 6px; }
        .plus { background: #d4edda; color: #155724; }
        .minus { background: #f8d7da; color: #721c24; }
        
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .btn-add { padding: 8px 15px; background: white; border: 1px solid var(--main-blue); color: var(--main-blue); margin-right: 5px; }
        .btn-add:hover { background: var(--main-blue); color: white; }
        .btn-del { padding: 8px 12px; background: #eee; color: #666; }
        .btn-analyze { width: 100%; padding: 15px; background: var(--main-blue); color: white; font-size: 1.1em; margin-top: 20px; }
        
        canvas { margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>단어 연산 분석기에 오신 것을 환영합니다!</h1>
        <p>인공지능의 방식으로 단어를 계산하고 유사도를 비교해보세요.</p>
    </div>

    <div class="intro-box">
        <b>💡 임베딩(Embedding)이란?</b><br>
        단어를 숫자로 바꿔서 컴퓨터가 계산할 수 있게 만드는 기술이에요. 비슷한 뜻을 가진 단어들은 숫자 세계에서도 서로 가까운 곳에 위치하게 됩니다.
    </div>

    <div id="wordList">
        </div>

    <div style="text-align: center; margin: 20px 0;">
        <button class="btn-add" onclick="addRow('plus')">+ 더하기(+) 추가</button>
        <button class="btn-add" onclick="addRow('minus')">- 빼기(-) 추가</button>
    </div>

    <div style="border-top: 1px solid #eee; padding-top: 20px;">
        <label><b>🎯 비교할 후보 단어들</b> (쉼표로 구분)</label>
        <input type="text" id="candidates" style="width: 100%; box-sizing: border-box; margin-top: 10px;" placeholder="예: 여왕, 공주, 왕비">
    </div>

    <button class="btn-analyze" onclick="analyzeSimilarity()">분석 시작하기</button>
    <canvas id="similarityChart"></canvas>
</div>
